<!doctype html>
<html lang="ko" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axismundi Lab - TT5 Footer Part</title>

  <link rel="stylesheet" href="../stylesheets/fonts.css" />
  <link rel="stylesheet" href="../stylesheets/icons.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.ref.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.sys.light.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.sys.core.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.comp.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.sys.dark.css" />
  <link rel="stylesheet" href="../stylesheets/wp-preset.bridge.css" />
  <link rel="stylesheet" href="../stylesheets/wp-custom.bridge.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.css" />
  <link rel="stylesheet" href="../stylesheets/base.css" />
  <link rel="stylesheet" href="../stylesheets/components.css" />

  <style>
    :root { color-scheme: light dark; }

    body.tt5-part-demo {
      margin: 0;
      color: var(--md-sys-color-on-surface);
      background: var(--md-sys-color-surface);
    }

    .tt5-part-context {
      block-size: 80px;
      background: var(--md-sys-color-surface-container-low);
    }

    .tt5-part-footer {
      border-block-start: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-low);
    }

    .tt5-part-footer__inner {
      display: grid;
      gap: 56px;
      inline-size: min(100% - 32px, 1340px);
      margin-inline: auto;
      padding-block: 48px 40px;
    }

    .tt5-site-logo {
      display: grid;
      place-items: center;
      inline-size: 40px;
      block-size: 40px;
      border-radius: var(--md-sys-shape-corner-full);
      color: var(--md-sys-color-on-primary);
      background: var(--md-sys-color-primary);
      font-weight: 700;
    }

    .tt5-footer-main {
      display: flex;
      flex-wrap: wrap;
      gap: 32px 80px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .tt5-footer-brand {
      display: grid;
      gap: 8px;
      min-inline-size: min(100%, 360px);
    }

    .tt5-footer-brand p {
      margin: 0;
      color: var(--md-sys-color-on-surface-variant);
    }

    .tt5-footer-navs {
      display: flex;
      flex-wrap: wrap;
      gap: 32px 56px;
    }

    .tt5-footer-nav {
      display: grid;
      gap: 8px;
    }

    .tt5-footer-nav a,
    .tt5-footer-bottom a {
      color: inherit;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .tt5-footer-spacer {
      block-size: 56px;
    }

    .tt5-footer-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      justify-content: space-between;
      color: var(--md-sys-color-on-surface-variant);
    }

    .tt5-footer-bottom p {
      margin: 0;
    }
  </style>
</head>
<body class="tt5-part-demo">
  <!--
    @fragment (template-part/footer; standalone specimen shell only)
    @tt5-source
    file: parts/footer.html -> patterns/footer.php
    pattern-slug: twentytwentyfive/footer
    blocks:
      wp:group[constrained, padding-top=spacing-60, padding-bottom=spacing-50]
        wp:group[align=wide]
          wp:site-logo
          wp:group[align=full, flex wrap, justifyContent=space-between, verticalAlignment=top]
            wp:columns -> site-title[level=2] + site-tagline
            wp:group[blockGap=spacing-80] -> navigation vertical x2
          wp:spacer[height=spacing-70]
          wp:group[align=full, flex wrap, justifyContent=space-between] -> theme credit + WordPress credit

    @layout-ontology v0.1
    wp-template-role: template-part/footer
    layout-decision: constrained footer with logo, brand/tagline, two vertical nav groups, large spacer, credit row
    layout-intent: site identity, secondary navigation, platform credit
    lab-mapping: site-logo -> circular mark; vertical navigation blocks -> two nav columns; spacer-70 -> 56px visual gap
    evidence-source: local TT5 1.5 parts/footer.html + patterns/footer.php
    evaluation-lens: site-chrome, secondary-navigation, attribution
    axismundi-route: Pilot_harness_later
    source-confidence: official_source
  -->

  <div class="tt5-part-context" aria-hidden="true"></div>
  <footer class="tt5-part-footer">
    <div class="tt5-part-footer__inner">
      <div class="tt5-site-logo" aria-hidden="true">A</div>
      <div class="tt5-footer-main">
        <div class="tt5-footer-brand">
          <span class="t-headline-small">Axismundi</span>
          <p class="t-body-medium">A lab translation of the Twenty Twenty-Five footer template part.</p>
        </div>
        <div class="tt5-footer-navs t-body-medium" aria-label="Footer navigation">
          <nav class="tt5-footer-nav" aria-label="Site">
            <a href="#">Blog</a>
            <a href="#">About</a>
            <a href="#">FAQs</a>
            <a href="#">Authors</a>
          </nav>
          <nav class="tt5-footer-nav" aria-label="Explore">
            <a href="#">Events</a>
            <a href="#">Shop</a>
            <a href="#">Patterns</a>
            <a href="#">Themes</a>
          </nav>
        </div>
      </div>
      <div class="tt5-footer-spacer" aria-hidden="true"></div>
      <div class="tt5-footer-bottom t-body-small">
        <p>Twenty Twenty-Five</p>
        <p>Designed with <a href="https://wordpress.org">WordPress</a></p>
      </div>
    </div>
  </footer>
</body>
</html>
