<!doctype html>
<html lang="ko" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Axismundi Lab - TT5 Header Part</title>

  <link rel="stylesheet" href="../stylesheets/fonts.css" />
  <link rel="stylesheet" href="../stylesheets/icons.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.ref.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.sys.light.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.comp.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.sys.dark.css" />
  <link rel="stylesheet" href="../stylesheets/wp-preset.bridge.css" />
  <link rel="stylesheet" href="../stylesheets/wp-custom.bridge.css" />
  <link rel="stylesheet" href="../stylesheets/tokens.css" />
  <link rel="stylesheet" href="../stylesheets/base.css" />
  <link rel="stylesheet" href="../stylesheets/components.css" />
  <link rel="stylesheet" href="../modules/ripple/lab-ripple.css" />
  <link rel="stylesheet" href="../modules/app-bar/lab-app-bar.css" />

  <style>
    :root { color-scheme: light dark; }

    body.tt5-part-demo {
      margin: 0;
      color: var(--md-sys-color-on-surface);
      background: var(--md-sys-color-surface);
    }

    .tt5-part-header {
      background: var(--md-sys-color-surface);
    }

    .tt5-part-header .app-bar {
      inline-size: min(100% - 32px, 1340px);
      margin-inline: auto;
      padding-block: 12px;
      padding-inline: 0;
      box-shadow: none;
      background: transparent;
    }

    .tt5-site-title {
      color: inherit;
      text-decoration: none;
      white-space: nowrap;
    }

    .tt5-navigation {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
    }

    .tt5-navigation a {
      display: inline-flex;
      align-items: center;
      min-block-size: 40px;
      padding-inline: 14px;
      border-radius: var(--md-sys-shape-corner-full);
      color: var(--md-sys-color-on-surface);
      text-decoration: none;
    }

    .tt5-navigation a:hover {
      background: color-mix(in srgb, var(--md-sys-color-on-surface) 8%, transparent);
    }

    .tt5-part-context {
      block-size: 100px;
      border-block-start: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-low);
    }
  </style>
</head>
<body class="tt5-part-demo">
  <!--
    @fragment (template-part/header; standalone specimen shell only)
    @tt5-source
    file: parts/header.html -> patterns/header.php
    pattern-slug: twentytwentyfive/header
    blocks:
      wp:group[align=full, layout=default]
        wp:group[constrained]
          wp:group[align=wide, padding-top/bottom=spacing-30, flex nowrap, justifyContent=space-between]
            wp:site-title[level=0]
            wp:group[blockGap=spacing-10, flex nowrap, justifyContent=right]
              wp:navigation[justifyContent=right, flexWrap=wrap]

    @layout-ontology v0.1
    wp-template-role: template-part/header (standard horizontal header)
    layout-decision: constrained wide row, site-title left, navigation right, flex space-between nowrap
    layout-intent: minimal global site identity and primary navigation
    lab-mapping: site-title -> left brand link; navigation -> right horizontal nav
    evidence-source: local TT5 1.5 parts/header.html + patterns/header.php
    evaluation-lens: site-chrome, navigation-orientation, template-part-reuse
    axismundi-route: Pilot_harness_later
    source-confidence: official_source
  -->

  <header class="tt5-part-header">
    <div class="app-bar app-bar--small" role="banner" aria-label="Site header">
      <div class="app-bar__leading">
        <a class="tt5-site-title t-title-large" href="#">Axismundi</a>
      </div>
      <nav class="app-bar__title tt5-navigation t-label-large" aria-label="Primary">
        <a href="#">Blog</a>
        <a href="#">About</a>
        <a href="#">FAQs</a>
        <a href="#">Authors</a>
      </nav>
    </div>
  </header>
  <div class="tt5-part-context" aria-hidden="true"></div>

  <script defer src="../modules/ripple/lab-ripple.js"></script>
</body>
</html>
